<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher & Student: 1+1 — Synapse Nano Banano Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Gochi+Hand&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafafa; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Caveat', cursive;
  }
  canvas { border: 3px solid #1E1E1E; border-radius: 8px; }
  .controls { margin-top: 16px; display: flex; gap: 12px; align-items: center; }
  button {
    padding: 6px 20px; font-family: 'Caveat', cursive; font-size: 20px;
    background: transparent; border: 2.5px solid #1E1E1E;
    border-radius: 6px; cursor: pointer; color: #1E1E1E; transition: all 0.15s;
  }
  button:hover { background: #1E1E1E; color: white; }
  .status { font-family: 'Gochi Hand', cursive; font-size: 18px; color: #888; min-width: 220px; }
  .loading { font-family: 'Gochi Hand', cursive; font-size: 24px; color: #888; }
</style>
</head>
<body>
<canvas id="c" width="960" height="640"></canvas>
<div class="controls">
  <button id="replayBtn">&#x21bb; Replay</button>
  <span class="status" id="status">Loading...</span>
</div>
<!-- Library data extracted from stick-figures.excalidrawlib -->
<script src="_libdata.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ══════════════════════════════════════════════
//  Excalidraw rough-style renderer
//  Matches roughness:1, strokeWidth:2 from lib
// ══════════════════════════════════════════════

function renderEllipse(el) {
  const cx = el.x + el.width / 2;
  const cy = el.y + el.height / 2;
  const rx = el.width / 2, ry = el.height / 2;
  const N = 24, sw = el.strokeWidth || 2;
  ctx.strokeStyle = el.strokeColor || '#000000';
  ctx.lineWidth = sw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const pts = [];
  for (let i = 0; i <= N; i++) {
    const a = (i / N) * Math.PI * 2;
    const ox = (Math.random() - 0.5) * (sw === 1 ? 1.5 : 2.5);
    const oy = (Math.random() - 0.5) * (sw === 1 ? 1.5 : 2.5);
    pts.push([cx + Math.cos(a) * rx + ox, cy + Math.sin(a) * ry + oy]);
  }
  ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  const bg = el.backgroundColor || 'transparent';
  if (bg && bg !== 'transparent') { ctx.fillStyle = bg; ctx.fill(); }
  ctx.stroke();
}

function renderLine(el) {
  const sw = el.strokeStyle === 'dashed' ? 1 : (el.strokeWidth || 2);
  ctx.strokeStyle = el.strokeColor || '#000000';
  ctx.lineWidth = sw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const points = el.points || [];
  if (points.length < 2) return;

  // For multi-point lines, draw with jitter
  ctx.beginPath();
  for (let i = 0; i < points.length; i++) {
    const px = el.x + points[i][0] + (i > 0 && i < points.length - 1 ? (Math.random() - 0.5) * 1.2 : 0);
    const py = el.y + points[i][1] + (i > 0 && i < points.length - 1 ? (Math.random() - 0.5) * 1.2 : 0);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  // If closed shape (first == last), optionally fill
  const bg = el.backgroundColor || 'transparent';
  if (bg && bg !== 'transparent') {
    ctx.closePath();
    ctx.fillStyle = bg; ctx.fill();
  }
  ctx.stroke();
}

function renderRectangle(el) {
  const sw = el.strokeWidth || 2;
  const x = el.x, y = el.y, w = el.width, h = el.height;
  ctx.strokeStyle = el.strokeColor || '#000000';
  ctx.lineWidth = sw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const corners = [[x,y],[x+w,y],[x+w,y+h],[x,y+h]];
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const [ax,ay] = corners[i], [bx,by] = corners[(i+1)%4];
    const segs = 4;
    for (let j = 0; j <= segs; j++) {
      const t = j / segs;
      const ox = j > 0 && j < segs ? (Math.random()-0.5)*1.2 : 0;
      const oy = j > 0 && j < segs ? (Math.random()-0.5)*1.2 : 0;
      const px = ax + (bx-ax)*t + ox, py = ay + (by-ay)*t + oy;
      (i===0&&j===0) ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
  }
  ctx.closePath();
  const bg = el.backgroundColor || 'transparent';
  if (bg && bg !== 'transparent') { ctx.fillStyle = bg; ctx.fill(); }
  ctx.stroke();
}

function renderElement(el) {
  if (el.isDeleted) return;
  if (el.type === 'ellipse') renderEllipse(el);
  else if (el.type === 'line') renderLine(el);
  else if (el.type === 'rectangle') renderRectangle(el);
  else if (el.type === 'text') {
    ctx.font = `${el.fontSize || 16}px 'Gochi Hand', cursive`;
    ctx.fillStyle = el.strokeColor || '#000000';
    ctx.fillText(el.text || '', el.x, el.y + (el.height || 20));
  }
}

// ══════════════════════════════════════════════
//  Load & parse .excalidrawlib
// ══════════════════════════════════════════════

let libItems = null;

// Bounding box of a figure's elements
function getBBox(elements) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const el of elements) {
    if (el.isDeleted) continue;
    if (el.type === 'ellipse' || el.type === 'rectangle') {
      minX = Math.min(minX, el.x); minY = Math.min(minY, el.y);
      maxX = Math.max(maxX, el.x + el.width); maxY = Math.max(maxY, el.y + el.height);
    } else if (el.type === 'line' && el.points) {
      for (const p of el.points) {
        minX = Math.min(minX, el.x + p[0]); minY = Math.min(minY, el.y + p[1]);
        maxX = Math.max(maxX, el.x + p[0]); maxY = Math.max(maxY, el.y + p[1]);
      }
    } else if (el.type === 'text') {
      minX = Math.min(minX, el.x); minY = Math.min(minY, el.y);
      maxX = Math.max(maxX, el.x + (el.width || 50)); maxY = Math.max(maxY, el.y + (el.height || 20));
    }
  }
  return { minX, minY, maxX, maxY, cx: (minX+maxX)/2, cy: (minY+maxY)/2, w: maxX-minX, h: maxY-minY };
}

// Draw a library item at (tx, ty) with scale
function drawLibItem(itemIndex, tx, ty, scale = 2) {
  const elements = libItems[itemIndex].elements;
  const bbox = getBBox(elements);
  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);
  ctx.translate(-bbox.cx, -bbox.cy);
  for (const el of elements) renderElement(el);
  ctx.restore();
}

// ══════════════════════════════════════════════
//  Scene drawing helpers
// ══════════════════════════════════════════════

function drawBlackboard() {
  // Wood frame
  const sw = 3;
  ctx.strokeStyle = '#000000'; ctx.lineWidth = sw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const pts = [[270,20],[690,20],[690,230],[270,230]];
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const [ax,ay] = pts[i], [bx,by] = pts[(i+1)%4];
    for (let j = 0; j <= 6; j++) {
      const t = j/6;
      const px = ax+(bx-ax)*t+(j>0&&j<6?(Math.random()-0.5)*1.5:0);
      const py = ay+(by-ay)*t+(j>0&&j<6?(Math.random()-0.5)*1.5:0);
      (i===0&&j===0)?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
  }
  ctx.closePath();
  ctx.fillStyle = '#8B6914'; ctx.fill(); ctx.stroke();
  // Board surface
  ctx.strokeStyle = '#000000'; ctx.lineWidth = 2.5;
  const pts2 = [[280,30],[680,30],[680,220],[280,220]];
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const [ax,ay] = pts2[i], [bx,by] = pts2[(i+1)%4];
    for (let j = 0; j <= 6; j++) {
      const t = j/6;
      const px = ax+(bx-ax)*t+(j>0&&j<6?(Math.random()-0.5)*1.2:0);
      const py = ay+(by-ay)*t+(j>0&&j<6?(Math.random()-0.5)*1.2:0);
      (i===0&&j===0)?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
  }
  ctx.closePath();
  ctx.fillStyle = '#2d3436'; ctx.fill(); ctx.stroke();
  // Chalk tray
  ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 3;
  ctx.beginPath();
  for (let j = 0; j <= 8; j++) {
    const t = j/8;
    const px = 280+400*t+(j>0&&j<8?(Math.random()-0.5)*1:0);
    const py = 223+(j>0&&j<8?(Math.random()-0.5)*1:0);
    j===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.stroke();
  // Chalk pieces
  ctx.fillStyle = '#fff'; ctx.fillRect(440,226,18,4);
  ctx.fillStyle = '#ffeaa7'; ctx.fillRect(465,226,14,4);
  ctx.fillStyle = '#fd79a8'; ctx.fillRect(485,226,12,4);
}

function drawFloor() {
  ctx.strokeStyle = '#000000'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  for (let j = 0; j <= 12; j++) {
    const t = j/12;
    const px = 30+900*t+(j>0&&j<12?(Math.random()-0.5)*1:0);
    const py = 520+(j>0&&j<12?(Math.random()-0.5)*1:0);
    j===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.stroke();
}

function drawChalk(text, x, y, size = 68, color = '#e8e8e8') {
  ctx.font = `${size}px 'Gochi Hand', cursive`;
  ctx.fillStyle = color;
  ctx.shadowColor = 'rgba(255,255,255,0.1)'; ctx.shadowBlur = 2;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
}

function drawBubble(cx, cy, text) {
  ctx.font = "22px 'Gochi Hand', cursive";
  const m = ctx.measureText(text);
  const pw = m.width + 30, ph = 38;
  const bx = cx - pw/2, by = cy - ph/2;
  ctx.fillStyle = 'white'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.roundRect(bx, by, pw, ph, 14); ctx.fill(); ctx.stroke();
  // Tail
  ctx.beginPath();
  ctx.moveTo(cx-8, by+ph); ctx.lineTo(cx, by+ph+14); ctx.lineTo(cx+8, by+ph);
  ctx.fillStyle = 'white'; ctx.fill(); ctx.strokeStyle = '#000000'; ctx.stroke();
  ctx.fillStyle = '#000000'; ctx.fillText(text, bx+15, by+28);
}

function drawThought(x, y, text, size = 50) {
  ctx.font = `bold ${size}px 'Gochi Hand', cursive`;
  ctx.fillStyle = '#000000'; ctx.fillText(text, x, y);
  ctx.fillStyle = '#000000';
  ctx.beginPath(); ctx.arc(x+8, y+12, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+5, y+22, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+3, y+28, 1.5, 0, Math.PI*2); ctx.fill();
}

let confetti = [];
function spawnConfetti() {
  const colors = ['#d97757','#55efc4','#ffeaa7','#74b9ff','#fd79a8','#a29bfe','#fdcb6e'];
  for (let i = 0; i < 60; i++) {
    confetti.push({
      x: 320+Math.random()*320, y: 20+Math.random()*80,
      vx: (Math.random()-0.5)*8, vy: Math.random()*2+1,
      r: Math.random()*6+3, c: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*360, rv: (Math.random()-0.5)*15, life: 1,
    });
  }
}

function drawConfetti() {
  for (const p of confetti) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.rot += p.rv; p.life -= 0.007;
    if (p.life <= 0) continue;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);
    ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.c;
    Math.random()>0.5 ? ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r) :
      (ctx.beginPath(), ctx.arc(0,0,p.r/2,0,Math.PI*2), ctx.fill());
    ctx.globalAlpha = 1; ctx.restore();
  }
  confetti = confetti.filter(p => p.life > 0);
}

function drawSparkle(x, y, size, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffeaa7'; ctx.strokeStyle = '#fdcb6e'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2-Math.PI/2;
    const r = i%2===0?size:size*0.35;
    i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.globalAlpha = 1; ctx.restore();
}

function drawWatermark() {
  ctx.font = "9px monospace";
  ctx.fillStyle = 'rgba(30,30,30,0.07)';
  ctx.fillText('whyj + nano banano + 2026/04/29', W-178, H-6);
}

function ease(t) { return t<0.5?2*t*t:-1+(4-2*t)*t; }

// ══════════════════════════════════════════════
//  Animation engine
// ══════════════════════════════════════════════

let startTime = 0, animId = null, running = false;

function start() {
  startTime = performance.now();
  confetti = []; running = true; tick();
}

function tick() {
  const t = (performance.now() - startTime) / 1000;
  ctx.clearRect(0, 0, W, H);

  // Seeded random for consistent wobble per frame
  const saved = Math.random;
  let seed = 42;
  Math.random = () => { seed=(seed*16807)%2147483647; return (seed-1)/2147483646; };

  drawFloor();
  drawBlackboard();

  // ── Teacher: Item 1 (hat+glasses+beard) → Item 2 (pointing) ──
  const tx = 210, ty = 510;
  const teacherItem = t > 4.5 ? 2 : 1;
  const teacherSlideX = t < 1.5 ? tx - 100 + ease(Math.min(t/1.2,1))*100 : tx;
  ctx.save();
  ctx.globalAlpha = Math.min(t / 1.0, 1);
  drawLibItem(teacherItem, teacherSlideX, ty, 1.6);
  ctx.restore();

  // ── Student: Item 0 (standing) → Item 3 (thinking) → Item 0 (happy) ──
  const sx = 740, sy = 510;
  const studentItem = (t > 6.5 && t < 10.0) ? 3 : 0;
  const studentSlideX = t < 2.5 ? sx + 100 - ease(Math.max(0, Math.min((t-1.2)/1.2,1)))*100 : sx;
  ctx.save();
  ctx.globalAlpha = t < 1.2 ? 0 : Math.min((t-1.2)/0.8, 1);
  drawLibItem(studentItem, studentSlideX, sy, 1.6);
  ctx.restore();

  // ── Chalk ──
  if (t > 3.5) drawChalk('1', 345, 148, 72);
  if (t > 4.8) drawChalk('+', 402, 148, 60);
  if (t > 5.8) drawChalk('1', 445, 148, 72);
  if (t > 8.8) drawChalk('=', 505, 148, 72);
  if (t > 9.4) drawChalk('2', 555, 148, 72, '#55efc4');

  // Circle around answer
  if (t > 10.2) {
    const N = 24;
    ctx.strokeStyle = '#d97757'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    for (let i = 0; i <= N; i++) {
      const a = (i/N)*Math.PI*2;
      const ox = (Math.random()-0.5)*2.5, oy = (Math.random()-0.5)*2.5;
      const px = 425+Math.cos(a)*145+ox, py = 130+Math.sin(a)*60+oy;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.stroke();
  }

  // ── Speech bubbles ──
  if (t > 1.8 && t < 3.5) drawBubble(teacherSlideX+50, ty-240, "Let's learn!");
  if (t > 2.5 && t < 4.0) drawBubble(studentSlideX-50, sy-240, "OK!");
  if (t > 6.2 && t < 8.2) drawBubble(teacherSlideX+50, ty-240, "1 + 1 = ?");
  if (t > 10.8 && t < 12.8) drawBubble(studentSlideX-50, sy-240, "Got it! = 2");

  // ── Thought ──
  if (t > 6.8 && t < 10.0) drawThought(studentSlideX+5, sy-210, '?');

  // ── Lightbulb ──
  if (t > 10.0) {
    const a = Math.min((t-10.0)*3, 1);
    const sz = 16+Math.sin(t*10)*3;
    ctx.save(); ctx.globalAlpha = a*0.25; ctx.fillStyle = '#ffeaa7';
    ctx.beginPath(); ctx.arc(studentSlideX, sy-210, 28, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.restore();
    drawSparkle(studentSlideX, sy-210, sz, a);
  }

  // ── Confetti ──
  if (t > 11.0) {
    Math.random = saved;
    if (confetti.length === 0) spawnConfetti();
    drawConfetti();
  }

  drawWatermark();
  Math.random = saved;

  const status = document.getElementById('status');
  if (t < 1.8)      status.textContent = 'Setting the scene...';
  else if (t < 3.5) status.textContent = 'Teacher & Student arrive';
  else if (t < 6.0) status.textContent = 'Writing 1 + 1 ...';
  else if (t < 8.5) status.textContent = 'Think about it...';
  else if (t < 10.5) status.textContent = '= 2 !!';
  else if (t < 13)  status.textContent = 'Celebration!';
  else { status.textContent = 'Done!'; running = false; }

  if (running) animId = requestAnimationFrame(tick);
}

// ══════════════════════════════════════════════
//  Init — LIB_DATA loaded from _libdata.js
// ══════════════════════════════════════════════

libItems = LIB_DATA;
document.getElementById('status').textContent = 'Ready';
document.getElementById('replayBtn').addEventListener('click', () => {
  if (animId) cancelAnimationFrame(animId);
  start();
});
start();
</script>
</body>
</html>
