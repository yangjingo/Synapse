<text x="350" y="42" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="22" fill="#384048" text-anchor="middle">Forward KL vs Reverse KL</text>
<text x="160" y="78" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="18" fill="#8888A0" text-anchor="middle">Forward KL</text>
<text x="160" y="95" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#788898" text-anchor="middle">mode-covering</text>
<text x="160" y="144.5" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="14" fill="#384048" text-anchor="middle">Teacher P</text>
<text x="160" y="233.5" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="middle">Student Q (stretched)</text>
<text x="308" y="203.5" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">① Mode-Covering</text>
<text x="308" y="220.4" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">Student must cover ALL</text>
<text x="308" y="237.3" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">teacher modes incl. noise.</text>
<text x="308" y="254.2" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">SFT = forward KL.</text>
<text x="540" y="78" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="18" fill="#7098A0" text-anchor="middle">Reverse KL</text>
<text x="540" y="95" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#788898" text-anchor="middle">mode-seeking</text>
<text x="540" y="144.5" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="14" fill="#384048" text-anchor="middle">Teacher P</text>
<text x="540" y="312" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="middle">Student Q (focused)</text>
<text x="628" y="203.5" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">② Mode-Seeking</text>
<text x="628" y="220.4" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">Only optimize where student</text>
<text x="628" y="237.3" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">visits. Preserve capabilities.</text>
<text x="628" y="254.2" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">Drop teacher noise.</text>
<text x="380" y="368.5" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="14" fill="#384048" text-anchor="middle">Multi-expert fusion: RKL corrects accent, never overwrites native ability</text>
<text x="688" y="326" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">★ Why RKL?</text>
<text x="688" y="342.9" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">10+ domain experts each with</text>
<text x="688" y="359.8" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">&quot;accent&quot;. RKL fuses knowledge</text>
<text x="688" y="376.7" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#384048" text-anchor="start">without killing base skills.</text>

<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1e1e2e" /></marker></defs>
</svg>