<text x="200" y="107" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="14" fill="#4A4540" text-anchor="middle">Teacher P (full distribution)</text>
<text x="350" y="187" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="14" fill="#4A4540" text-anchor="middle">Student Q (shifted distribution)</text>
<text x="275" y="283" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="12" fill="#4A4540" text-anchor="middle"></text>
<text x="275" y="71" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#9A7E7E" text-anchor="middle">overlap zone</text>
