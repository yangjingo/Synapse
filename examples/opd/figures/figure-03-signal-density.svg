<text x="388" y="208.5" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="18" fill="#4A4540" text-anchor="middle">?</text>
<text x="498" y="192" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="14" fill="#4A4540" text-anchor="middle">O(1) bit</text>
<text x="280" y="249.5" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="10" fill="#4A4540" text-anchor="middle"></text>
<text x="240" y="281" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="16" fill="#7A9188" text-anchor="middle">OPD (dense signal)</text>
<text x="104" y="327" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="13" fill="#4A4540" text-anchor="middle">t1</text>
<text x="104" y="377" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="12" fill="#4A4540" text-anchor="middle">0.92</text>
