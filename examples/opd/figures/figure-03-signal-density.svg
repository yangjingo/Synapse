<text x="280" y="42" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="22" fill="#4A4540" text-anchor="middle">Signal Density: RL vs OPD</text>
<text x="240" y="76" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="16" fill="#9A7E7E" text-anchor="middle">RL (sparse reward)</text>
