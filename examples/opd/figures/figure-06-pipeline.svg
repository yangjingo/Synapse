<text x="605" y="240" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="11" fill="#3E4438" text-anchor="middle">RKL</text>
<text x="605" y="254.3" font-family="Virgil, Segoe UI Emoji, sans-serif" font-size="11" fill="#3E4438" text-anchor="middle">low-entropy</text>
