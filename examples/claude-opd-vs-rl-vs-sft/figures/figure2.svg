<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-rl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a3324"></path>
    </marker>
  </defs>
  <text x="20" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#1c1916" font-weight="500" letter-spacing="1.5">RL — PER-TOKEN GRADIENTS &amp; THEIR AVERAGE</text>

  <g transform="translate(60, 50)">
    <text x="120" y="0" text-anchor="middle" font-family="Spectral, serif" font-style="italic" font-size="13" fill="#3a342c">individual per-token gradient vectors</text>
    <circle cx="120" cy="125" r="100" fill="none" stroke="#c9bfa9" stroke-width="1" stroke-dasharray="2,3"></circle>
    <circle cx="120" cy="125" r="3" fill="#1c1916"></circle>
    <g stroke="#8b8275" stroke-width="1.2" fill="none" opacity="0.85">
      <line x1="120" y1="125" x2="155" y2="85"></line>
      <line x1="120" y1="125" x2="80" y2="100"></line>
      <line x1="120" y1="125" x2="60" y2="145"></line>
      <line x1="120" y1="125" x2="160" y2="160"></line>
      <line x1="120" y1="125" x2="100" y2="65"></line>
      <line x1="120" y1="125" x2="180" y2="110"></line>
      <line x1="120" y1="125" x2="75" y2="175"></line>
      <line x1="120" y1="125" x2="170" y2="185"></line>
      <line x1="120" y1="125" x2="130" y2="60"></line>
      <line x1="120" y1="125" x2="65" y2="85"></line>
      <line x1="120" y1="125" x2="185" y2="140"></line>
      <line x1="120" y1="125" x2="55" y2="120"></line>
      <line x1="120" y1="125" x2="95" y2="185"></line>
      <line x1="120" y1="125" x2="145" y2="65"></line>
      <line x1="120" y1="125" x2="190" y2="160"></line>
      <line x1="120" y1="125" x2="115" y2="200"></line>
      <line x1="120" y1="125" x2="155" y2="200"></line>
    </g>
    <g stroke="#8a3324" stroke-width="1.4" fill="none" opacity="0.9">
      <line x1="120" y1="125" x2="175" y2="80"></line>
      <line x1="120" y1="125" x2="195" y2="95"></line>
      <line x1="120" y1="125" x2="180" y2="70"></line>
      <line x1="120" y1="125" x2="200" y2="90"></line>
    </g>
    <text x="120" y="248" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#6b6357">N noisy vectors, mean ≈ 0</text>
  </g>

  <text x="320" y="180" font-family="JetBrains Mono, monospace" font-size="14" fill="#3a342c">average →</text>

  <g transform="translate(440, 50)">
    <text x="120" y="0" text-anchor="middle" font-family="Spectral, serif" font-style="italic" font-size="13" fill="#3a342c">batch-averaged update</text>
    <circle cx="120" cy="125" r="100" fill="none" stroke="#c9bfa9" stroke-width="1" stroke-dasharray="2,3"></circle>
    <circle cx="120" cy="125" r="3" fill="#1c1916"></circle>
    <line x1="120" y1="125" x2="155" y2="98" stroke="#8a3324" stroke-width="3" marker-end="url(#arr-rl)"></line>
    <text x="170" y="85" font-family="Spectral, serif" font-style="italic" font-size="12" fill="#8a3324">surviving signal</text>
    <text x="170" y="100" font-family="Spectral, serif" font-style="italic" font-size="12" fill="#8a3324">(dimensions correlated</text>
    <text x="170" y="115" font-family="Spectral, serif" font-style="italic" font-size="12" fill="#8a3324">with reward)</text>
    <text x="120" y="248" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#6b6357">noise cancels, bias survives</text>
  </g>
</svg>