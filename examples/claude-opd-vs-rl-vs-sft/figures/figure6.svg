<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg">
  <text x="20" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#1c1916" font-weight="500" letter-spacing="1.5">TEACHER PARETO CURVE</text>

