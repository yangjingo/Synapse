  <path d="M 130 273 Q 240 245 360 220 Q 470 200 560 188 Q 540 230 410 250 Q 270 268 130 273 Z" fill="#8b8275" opacity="0.2" stroke="#6b6357" stroke-width="0.7" stroke-dasharray="3,3"></path>
  <text x="320" y="245" text-anchor="middle" font-family="Fraunces, serif" font-size="13" font-weight="500" fill="#3a342c">OPSD / SDFT region</text>
