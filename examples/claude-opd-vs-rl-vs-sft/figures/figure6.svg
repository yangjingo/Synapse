  <text x="370" y="332" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a342c">max<tspan font-size="8" dy="2">π_T</tspan><tspan dy="-2">  E[R(π_T) − R(π_θ)]  −  β · KL(π_T ‖ π_θ)</tspan></text>
