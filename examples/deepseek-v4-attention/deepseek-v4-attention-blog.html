<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手撕 DeepSeek-V4 注意力方案 | Synapse v6.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAF7;
      --ink: #1A1A1A;
      --muted: #8A7F70;
      --accent: #C45A20;
      --accent-light: #FDF0E6;
      --border: #E8E2D8;
      --serif: 'Noto Serif SC', Georgia, serif;
      --sans: 'Inter', 'Helvetica Neue', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg); color: var(--ink); }
    body { min-height: 100vh; padding-bottom: 48px; }

    .page { max-width: 700px; margin: 0 auto; padding: 72px 24px 0; }

    .title-line {
      font-family: var(--serif);
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.03em;
    }
    .lead-block {
      font-family: var(--sans);
      font-weight: 500;
      font-size: 15.5px;
      line-height: 26px;
      color: var(--muted);
      margin: 16px 0 0;
    }
    .hr { height: 1px; background: var(--border); margin: 40px 0; }

    .section { margin-top: 40px; }
    .section-h {
      font: 700 15px/1.3 var(--sans);
      color: var(--accent);
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    .section-body {
      font: 400 17px/30px var(--serif);
      color: var(--ink);
    }
    .section-body a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(196,90,32,0.3);
      text-underline-offset: 2px;
      transition: text-decoration-color 0.2s;
    }
    .section-body a:hover {
      text-decoration-color: var(--accent);
    }
    .callout {
      position: relative;
      margin: 20px 0;
      padding: 16px 20px 16px 24px;
      background: var(--accent-light);
      border-radius: 4px;
      font: 500 15px/25px var(--sans);
      color: #6B3A12;
    }
    .callout::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent);
      border-radius: 4px 0 0 4px;
    }
    .figure-block {
      margin: 32px auto;
      border-radius: 6px;
      overflow: hidden;
      background: #F5F3EE;
      max-width: 100%;
    }
    .figure-block img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 70vh;
      object-fit: contain;
      object-position: center;
      background: #fff;
      cursor: zoom-in;
      transition: transform 0.3s ease;
    }
    .figure-block.zoomed {
      position: fixed;
      inset: 0;
      max-width: none;
      margin: 0;
      border-radius: 0;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .figure-block.zoomed img {
      max-height: none;
      width: auto;
      max-width: 95vw;
      max-height: 95vh;
      cursor: zoom-out;
    }
    .figure-block.zoomed .figure-caption {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #eee;
      border-radius: 4px;
      padding: 6px 14px;
    }
    .figure-caption {
      padding: 10px 16px 4px;
      font: 500 13px/20px var(--sans);
      color: var(--muted);
    }
    .figure-prompt-vis {
      padding: 4px 16px 12px;
      font: 400 11.5px/17px var(--sans);
      color: #B0A898;
      border-top: 1px solid #E8E2D8;
      margin-top: 2px;
    }
    .figure-placeholder {
      padding: 32px 20px;
      text-align: center;
      background: #EDEBE6;
    }
    .figure-placeholder-icon {
      font: 700 28px/1 var(--sans);
      color: var(--border);
      margin-bottom: 8px;
    }
    .figure-placeholder-label {
      font: 600 13px/1 var(--sans);
      color: var(--accent);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .figure-placeholder-prompt {
      font: 400 12px/18px var(--sans);
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto;
      white-space: pre-wrap;
    }
    .pulse {
      margin-top: 48px;
      font: 600 17px/28px var(--sans);
      color: var(--accent);
    }

    .section-body pre {
      background: #1E1E2E;
      color: #CDD6F4;
      padding: 16px 20px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 16px 0;
      font: 400 13px/20px 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      tab-size: 4;
      position: relative;
      -webkit-user-select: all;
      user-select: all;
    }
    .section-body pre:hover {
      outline: 2px solid #45475A;
      outline-offset: -2px;
    }
    .section-body pre::after {
      content: '复制';
      position: absolute;
      top: 6px;
      right: 6px;
      background: #313244;
      color: #A6ADC8;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      font: 500 11px/1 var(--sans);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: auto;
    }
    .section-body pre:hover::after {
      opacity: 1;
    }
    .section-body pre.copied::after {
      content: '已复制';
      background: #A6E3A1;
      color: #1E1E2E;
    }
    .section-body pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      font: inherit;
      color: inherit;
    }
    .section-body code {
      background: var(--accent-light);
      color: #6B3A12;
      padding: 2px 6px;
      border-radius: 3px;
      font: 400 13px/1.4 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }
    .section-body .kw { color: #CBA6F7; }
    .section-body .fn { color: #89B4FA; }
    .section-body .st { color: #A6E3A1; }
    .section-body .cm { color: #6C7086; font-style: italic; }
    .section-body .nb { color: #FAB387; }
    .section-body .op { color: #89DCEB; }

    .meta-tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 3px;
      font: 700 11px/1 var(--sans);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .meta-date {
      font: 500 13px/1 var(--sans);
      color: var(--muted);
      margin-bottom: 24px;
    }

    .stats {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(250,250,247,0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      padding: 8px 24px;
      display: flex; gap: 20px; flex-wrap: wrap;
      font: 500 11px/1 var(--sans);
      color: var(--muted);
      z-index: 100;
    }
    .stats .v { color: var(--accent); font-weight: 700; }

    /* stick figure overlay */
    #stick-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 50;
    }
  </style>
</head>

  {
    heading: `滑窗注意力：代码实现与注意力抽象小结`,
    body: `滑窗注意力是压缩注意力的自然补充：每个 query 仅关注窗口内的 KV，O(L^2) 降到 O(L*w)。实现上复用了 SingleQuerySDPA，只是 KV 的选取范围变成了窗口。代码中 AttentionSlidingWindow 的 forward 方法，对每个 query j，left = max(j, j - window_size)，right = min(j, j + window_size)，拉取这个范围内的 K 和 V，调用 SingleQuerySDPA。block-wise attention 天然适配 SWA。到这里，五种注意力抽象全部出场了：标准注意力（全局 O(L^2)，所有 KV 参与）、Mask-Free（真正减少计算量，逐 query 拉取）、Top-K（Pre 模式先选后算，避免 O(L^2)）、压缩注意力（降维表示，遗留位置编码和因果泄漏）、滑窗注意力（局部信息，O(L*w) 复杂度）。V4 的 HCA 和 CSA 就是这五种抽象的有机组合。`,
    bodyHTML: '<div>滑窗注意力是压缩注意力的自然补充：每个 query 仅关注窗口内的 KV，O(L<sup>2</sup>) 降到 O(L*w)。实现上复用了 SingleQuerySDPA，只是 KV 的选取范围变成了窗口。</div><pre><code>class AttentionSlidingWindow(nn.Module):\n    def forward(self, X, window_size):\n        B, L, D = X.shape\n        Q, K, V = self.Wq(X), self.Wk(X), self.Wv(X)\n        Z = torch.zeros_like(Q)\n        for i in range(B):\n            for j in range(L):\n                left = max(j, j - window_size)\n                right = min(j, j + window_size)\n                q = Q[i,[j], :]\n                K_ = K[i, left:right, :]\n                V_ = V[i, left:right, :]\n                Z[i,j,:] = SingleQuerySDPA(q, K_, V_)\n        O = self.Wo(Z)\n        return O</code></pre><div>block-wise attention 天然适配 SWA。到这里，五种注意力抽象全部出场了：标准注意力（全局 O(L<sup>2</sup>)）、Mask-Free（逐 query 拉取）、Top-K（Pre 模式先选后算）、压缩注意力（降维表示）、滑窗注意力（局部 O(L*w)）。V4 的 HCA 和 CSA 就是这五种抽象的有机组合。</div>',

  // ═══ Mechanism IV: HCA (slides 23-26) ═══
  {
    heading: `HCA：可学习 Compressor 设计`,
    body: `HCA（Heavily Compressed Attention）的压缩不再用简单的 mean-pooling，而是用了一个可学习的 Compressor。核心是一个线性投影 w_compress，参数是 [compress_ratio, 1] 的线性层，对每段 KV 做加权压缩。和 mean-pooling 相比，Compressor 的压缩表达更具表达能力——它可以学习哪些 token 更重要，给更高的权重。代码实现：Compressor 类在 __init__ 中初始化 w_compress = nn.Linear(compress_ratios, 1, bias=False)，forward 中先 reshape 为 [B, n_c, c, D]，然后 transpose 再过线性投影压缩。`,
    bodyHTML: '<div>HCA（Heavily Compressed Attention）的压缩不再用简单的 mean-pooling，而是用了一个可学习的 Compressor。核心是一个线性投影 w<sub>compress</sub>，参数是 [compress_ratio, 1] 的线性层，对每段 KV 做加权压缩。和 mean-pooling 相比，Compressor 的压缩表达更具表达能力——它可以学习哪些 token 更重要，给更高的权重。</div><pre><code>class Compressor(nn.Module):\n    def __init__(self, compress_ratios, dim):\n        super().__init__()\n        self.compress_ratios = compress_ratios\n        self.w_compress = nn.Linear(compress_ratios, 1, bias=False)\n\n    def forward(self, X):\n        B, L, D = X.shape\n        c, n_c = self.compress_ratios, L // self.compress_ratios\n        if self.compress_ratios > 1:\n            X_ = X.reshape(B, n_c, c, D)\n            X_ = self.w_compress(X_.transpose(2,3))[...,0]\n        return X_</code></pre>'

  {
    heading: `HCA：因果压缩前向计算`,
    body: `因果约束是 HCA 的关键设计：第 j 个 query 只能看到 j // ratio 个压缩 KV 块。以 ratio=4 为例，序列长度 8192 仅产生 2048 个压缩 KV。实现中，先通过 Compressor 得到压缩后的 K_ 和 V_，然后逐 query 计算注意力。因果边界 j_ = j // compress_ratios，只看 j_ 之前的压缩 KV。代码中 j_ = j // args.compress_ratios，K_c 和 V_c 只取 [:j_] 的部分。这保证了 query 不会看到未来的信息。`,
    bodyHTML: '<div>因果约束是 HCA 的关键设计：第 j 个 query 只能看到 j // ratio 个压缩 KV 块。以 ratio=4 为例，序列长度 8192 仅产生 2048 个压缩 KV。</div><pre><code>bsz, seq_len = 2, 8192\nargs.compress_ratios = 4\n\ncompressor = Compressor(args.compress_ratios, args.dim)\nK_ = compressor(K)  # [B, 2048, D]\nV_ = compressor(V)  # [B, 2048, D]\n\nO = torch.zeros_like(Q)\nfor i in range(bsz):\n    for j in range(seq_len):\n        j_ = j // args.compress_ratios  # 因果边界\n        K_c, V_c = K_[i, :j_], V_[i, :j_]\n        O[i,j] = Q[i, [j]] @ K_c.T @ V_c</code></pre><div>因果边界 j_ = j // compress_ratios，只看 j_ 之前的压缩 KV，保证 query 不会看到未来信息。</div>'

  {
    heading: `HCA：信息泄漏与 SWA 配合`,
    body: `因果约束下压缩 KV 的信息泄漏是真实问题。一个压缩块包含多个 token 的 KV，query 只应看到过去的信息。因果边界 j_ = j // ratio 只看到 j_ 之前的完整压缩块——但代价是当前 token 所在块的信息被丢弃。这就是为什么 HCA 必须夹带 SWA：没有 SWA，因果压缩的信息空缺无法填补。分工很清楚——HCA 通过强压缩捕获远场信息（代价更低），SWA 填补因果压缩丢弃的当前块信息（近场不丢）。HCA 不独立运行，这是设计上的硬约束。`,
    bodyHTML: '<div>因果约束下压缩 KV 的信息泄漏是真实问题。一个压缩块包含多个 token 的 KV，query 只应看到过去的信息。因果边界 j_ = j // ratio 只看到 j_ 之前的完整压缩块——但代价是当前 token 所在块的信息被丢弃。</div><div>这就是为什么 HCA 必须夹带 SWA：没有 SWA，因果压缩的信息空缺无法填补。分工很清楚——HCA 通过强压缩捕获远场信息（代价更低），SWA 填补因果压缩丢弃的当前块信息（近场不丢）。</div>',
    callout: `因果约束下压缩 KV 的信息泄漏是真实问题——空缺由 SWA 补，这是 HCA 必须夹带 SWA 的原因。`

  // ═══ Mechanism V: CSA (slides 27-35) ═══
  {
    heading: `CSA：Indexer 类设计与前向计算流程`,
    body: `CSA（Compressed Sparse Attention）的 Indexer 功能是轻量投影做点积评分，top-k 选出稀疏索引。简化版是投影到 1 维做评分——Wk_light 和 Wq_light 都是 nn.Linear(dim, 1)，Q 和 K 各投影后做点积，torch.topk 选出 top-k 索引。但 V4 实际的实现更复杂：投影到 n_head=64 维，weights_proj 学习每个头的重要性权重，再加权求和。CSA 的前向计算分四步：第一步，Compressor 对 KV 做轻量压缩（ratio=4）；第二步，Indexer 对原始 KV 做 top-k 筛选；第三步，每个 query 同时计算稀疏 KV 和压缩 KV 注意力；第四步，结果相加。双路注意力——稀疏 KV 保证精度，压缩 KV 弥补全局信息。`,
    bodyHTML: '<div>CSA（Compressed Sparse Attention）的 Indexer 功能是轻量投影做点积评分，top-k 选出稀疏索引。简化版是投影到 1 维做评分：</div><pre><code>class Indexer(nn.Module):\n    def __init__(self, args):\n        super().__init__()\n        dim, n_head = args.dim, args.n_heads\n        # 简化版：投影到1维做点积评分\n        self.Wk_light = nn.Linear(dim, 1, bias=False)\n        self.Wq_light = nn.Linear(dim, 1, bias=False)\n\n    def forward(self, Q, K, topk):\n        Q_, K_ = self.Wq_light(Q), self.Wk_light(K)\n        S = Q_ @ K_.transpose(-2, -1)\n        _, idx = torch.topk(S, topk, dim=-1)\n        return idx</code></pre><div>但 V4 实际的实现更复杂：投影到 n_head=64 维，weights_proj 学习每个头的重要性权重，再加权求和。CSA 的前向计算分四步：第一步 Compressor 压缩 KV（ratio=4）；第二步 Indexer top-k 筛选；第三步双路注意力；第四步结果相加。</div>',
    callout: `双路注意力——稀疏 KV 保证精度，压缩 KV 弥补全局信息。`

  {
    heading: `CSA：代码实现（基础版）`,
    body: `基础版代码把 Compressor 和 Indexer 串联起来：先用 Compressor 压缩 KV（ratio=4），再用 Indexer 选出稀疏索引。然后逐 query 计算：对每个 query 位置 j，分别对稀疏 KV 和压缩 KV 算注意力，结果累加。这就是双路注意力的核心。`,
    bodyHTML: '<div>基础版代码把 Compressor 和 Indexer 串联起来：</div><pre><code>Q = torch.randn(bsz, seq_len, args.dim)\nK = torch.randn(bsz, seq_len, args.dim)\nV = torch.randn(bsz, seq_len, args.dim)\n\nargs.compress_ratios = 4\ncompressor = Compressor(args.compress_ratios, args.dim)\nK_ = compressor(K)  # 压缩 KV\nV_ = compressor(V)\n\nindexer = Indexer(args)\nidx = indexer(Q, K, args.attn_top_k)  # 稀疏索引\n\nz = torch.zeros_like(Q)\nfor i in range(bsz):\n    for j in range(seq_len):\n        sparse_ids = idx[i, j]\n        z[i, [j]] += attn(Q[i, [j]], K[i, sparse_ids], V[i, sparse_ids])\n        z[i, [j]] += attn(Q[i, [j]], K_[i, :], V_[i, :])  # 压缩 KV</code></pre><div>对每个 query 位置 j，分别对稀疏 KV 和压缩 KV 算注意力，结果累加。这就是双路注意力的核心。</div>'

  {
    heading: `CSA：Overlap 平滑策略与代码`,
    body: `Overlap 的目的是把相邻段的压缩特征拼到当前位置，使段间过渡自然，避免边界信息断裂。这个设计只在 CSA 中使用，HCA 不需要。代码中 overlap 函数先创建一个 [B, L, D*2] 的张量，前半部分放前一段的压缩特征（X_[:, 1:, :D] = X[:, :L-1, :]），后半部分放当前段（X_[:, :, D:] = X）。overlap 后压缩 KV 从 [B, L/4, D] 变为 [B, L/4, 2D]，再通过 reshape 加 sum 压缩回 [B, L/4, D]。coff = 1 + overlap_flag，当 overlap_flag=1 时做 sum 压缩。`,
    bodyHTML: '<div>Overlap 的目的是把相邻段的压缩特征拼到当前位置，使段间过渡自然，避免边界信息断裂。这个设计只在 CSA 中使用，HCA 不需要。</div><pre><code>def overlap(X):\n    B, L, D = X.shape\n    X_ = torch.zeros(B, L, D*2)\n    X_[:, :, D:] = X          # 当前段\n    X_[:, 1:, :D] = X[:, :L-1, :]  # 前一段\n    return X_\n\n# Overlap 后再压缩回原维度\noverlap_flag = 1\ncoff = 1 + overlap_flag\n\nK_ = overlap(compressor(K))  # [B, L/4, 2D]\nV_ = overlap(compressor(V))\n\nif overlap_flag:\n    _, L_c, _ = K_.shape\n    K_ = K_.reshape(bsz, L_c, args.dim, coff).sum(dim=-1)\n    V_ = V_.reshape(bsz, L_c, args.dim, coff).sum(dim=-1)</code></pre><div>overlap 后压缩 KV 从 [B, L/4, D] 变为 [B, L/4, 2D]，再通过 reshape 加 sum 压缩回 [B, L/4, D]。</div>'

    heading: `CSA：三路 KV 拼接与统一 Softmax`,
    body: `CSA 的工程精髓在于三路 KV 拼接：每个 query 同时关注稀疏 KV（Top-K 筛选的）、窗口 KV（SWA 滑窗的）、压缩 KV（Compressor 压缩的）。拼接在候选索引层面：K_mix = torch.cat((K[i, sparse_ids], K[i, left:right], K_[i, :]))，V 同理。注意力计算统一进行，softmax 自动归一化。这里有个关键设计：三路 KV 拼接为统一序列后做全局 Softmax，不需要分别归一化再加权。分别归一化会丢失跨路径的相对重要性。完整计算要点是：原始 KV 和压缩 KV 在内存中拼接为统一序列，候选索引由 [window_ids, sparse_ids, compress_ids] 三路拼接，Sparse Kernel 按候选索引逐 query 拉取 KV 子集，零浪费计算注意力。`,
    bodyHTML: '<div>CSA 的工程精髓在于三路 KV 拼接：每个 query 同时关注稀疏 KV（Top-K 筛选的）、窗口 KV（SWA 滑窗的）、压缩 KV（Compressor 压缩的）。</div><pre><code>win = 128\nz = torch.zeros_like(Q)\nfor i in range(bsz):\n    for j in range(seq_len):\n        sparse_ids = idx[i, j]\n        left, right = max(0, j-win), min(seq_len, j+win)\n\n        K_mix = torch.cat((\n            K[i, sparse_ids],      # Top-K 稀疏 KV\n            K[i, left:right],      # 滑窗 KV\n            K_[i, :]))             # 压缩 KV\n        V_mix = torch.cat((\n            V[i, sparse_ids],\n            V[i, left:right],\n            V_[i, :]))\n\n        z[i,j] = attn(Q[i, [j]], K_mix, V_mix)</code></pre><div>三路 KV 拼接为统一序列后做全局 Softmax，不需要分别归一化再加权。分别归一化会丢失跨路径的相对重要性。</div>',

    image: `./figures/fig-mqa-vs-mla.png`,
    caption: `Fig 10: MQA vs MLA 核心区别——MLA 上投影到多头 KV 后再算注意力，推理时需反复加载上投影矩阵把 latent cache 还原成高维 KV，长解码下开销显著；V4-MQA 直接用单头 KV 计算，引入分组输出投影控制 Wo 规模。`,
    prompt: `MQA 与 MLA 对比示意图。V4 原始论文配图。`

  {
    heading: `V4-MQA：算法设计与完整代码`,
    body: `V4 用了 MQA（Multi Query Attention），KV 头数 n_kv_heads = 1，极大减少 KV-Cache 量。MQA 下单 query 维度为 [H, d]，单头 KV 块为 [blk, d]，一次矩阵乘即得所有头分数。但 V4-MQA 不只是 KV 头数为 1 的 MQA——它引入了分组输出投影。完整代码：MQA 类的 __init__ 中，n_kv_heads = 1，Wq 投影到 n_heads * head_dim，Wc 投影到 head_dim（中间压缩），Wk 和 Wv 从 head_dim 投影到 head_dim。关键是 Wo_a 和 Wo_b 两段投影——Wo_a 把 n_heads * head_dim // o_groups 维度降到 o_groups * o_lora_rank，Wo_b 再升维回 dim。前向计算中，Q reshape 为多头格式，K 和 V reshape 为单头（因为 n_kv_heads=1），计算注意力后通过 Wo_a 分组降维再 Wo_b 升维回 dim。`,
    bodyHTML: '<div>V4 用了 MQA（Multi Query Attention），KV 头数 n<sub>kv_heads</sub> = 1，极大减少 KV-Cache 量。但 V4-MQA 不只是 KV 头数为 1 的 MQA——它引入了分组输出投影。</div><pre><code>class MQA(nn.Module):\n    def __init__(self, args, o_lora_rank, o_groups):\n        super().__init__()\n        dim, head_dim, self.n_heads = args.dim, args.head_dim, args.n_heads\n        self.n_kv_heads = 1\n        self.Wq = nn.Linear(dim, self.n_heads * head_dim, bias=False)\n        self.Wc = nn.Linear(dim, head_dim, bias=False)\n        self.Wk = nn.Linear(head_dim, head_dim, bias=False)\n        self.Wv = nn.Linear(head_dim, head_dim, bias=False)\n        self.o_lora_rank, self.o_groups = o_lora_rank, o_groups\n        self.Wo_a = nn.Linear(self.n_heads * head_dim // o_groups,\n                              o_groups * o_lora_rank, bias=False)\n        self.Wo_b = nn.Linear(o_lora_rank * self.n_heads, dim, bias=False)</code></pre><pre><code>    def forward(self, X, mask):\n        B, L, D = X.shape\n        Q, K, V = self.Wq(X), self.Wk(X), self.Wv(X)\n        Q = Q.reshape(B, L, self.n_heads, D // self.n_heads).transpose(1, 2)\n        K = K.reshape(B, L, self.n_heads, D // self.n_kv_heads).transpose(1, 2)\n        V = V.reshape(B, L, self.n_heads, D // self.n_kv_heads).transpose(1, 2)\n        Z = ScaledDotProductionAttention(Q, K, V, mask)\n\n        d = self.n_heads * D // self.o_groups\n        Z = Z.reshape(B, L, self.o_groups, d)\n        Z = self.Wo_a(Z)           # 分组降维\n        Z = Z.reshape(B, L, self.o_lora_rank * d)\n        O = self.Wo_b(Z)           # 升维回 dim\n        return O</code></pre>'
  },
  {
    heading: `Group Projection：参数规模分析与验证`,
    body: `V4-Pro 的配置是 dim=7168, n_heads=128, head_dim=512, o_groups=16。多头输出拼接后维度是 128 * 512 = 65536，全连接 Wo [65536, 7168] 参数量约 4.7 亿，不可接受。V4 的拆分方案：Wo_a = [16, 1024, 4096] 分组降维，Wo_b = [16384, 7168] 升维回 dim。参数量从 O(D^2) 降到 O(D * r)。数学等价性可以用简单代码验证：Wo_a = torch.ones(2, 4, 3)（2 groups），X = torch.ones(5, 4)，Y = X @ Wo_a 的结果和逐组 Y1 = X @ Wo_a[0] 完全一致，norm 差为 0。五条洞察：第一，每 8 个头拼为一条组向量，128 头共 16 条；第二，组隔离，组间计算完全隔离；第三，分组等价于把 128 个头压成 16 个共享组头，每组独立投影权重；第四，总开销由组数、组内维度与中间维度决定；第五，块对角结构贴合 Tensor Core 高效区间，适配 FP4/FP8 量化。`,

    bodyHTML: '<div>V4 的 Sparse Attention Kernel 统一接口是 sparse_attn(q, kv, attn_sink, topk_idxs, softmax_scale)。KV 布局是 kv = [2, L + L<sub>compressed</sub>, d]，原始 KV 和压缩 KV 拼在一起。索引来源三路：SWA + Sparse + Compress。</div><pre><code>if __name__ == “__main__”:\n    L, H, d = 4, 8, 32\n    L_compressed = 6\n\n    # QKV\n    q = torch.randn(L, H, d)\n    kv = torch.randn(2, L + L_compressed, d)  # 原始 KV + 压缩 KV\n\n    # ids: 三路来源\n    num_win_ids = 2\n    num_sparse_ids = 3\n    num_compressed_ids = 1\n    K = num_win_ids + num_sparse_ids + num_compressed_ids\n\n    topk_ids = torch.randint(0, L + L_compressed, (L, K))\n\n    # sparse attn\n    out = sparse_linear_attn_torch(q, kv, topk_ids, block=3)\n    print(out.shape)  # torch.Size([4, 8, 32]</code></pre>'

  {
    heading: `Sparse Kernel：逐 query 块式 gather 与 MQA 优势`,
    body: `核心实现是 sparse_linear_attn_torch 函数。外循环逐 query（for i in range(L)），内循环分块 gather（for t in range(num_blocks)）：topk_ids 分块，逐块从非连续地址拉取 KV 子集。kv_block = kv[:, idxs] 是非连续 gather，scores = qi @ kv_block[0].T 计算 q @ K，acc_o += scores @ kv_block[1] 计算 score @ V。三个关键提炼：第一，外循环逐 query 内循环分块，topk_ids 分块 gather 逐块计算；第二，gather 的 KV 地址不连续，各 query 的稀疏子集互不相交；第三，MQA 优势——qi [H, d] @ K_block.T [d, blk] 得 [H, blk]，多头并行无额外开销。MQA 下 KV 只有一份所有 query 头共享，一次 GEMM 即可计算所有头的注意力分数。对比 MHA 需要 H 次独立 gather 加 H 次 GEMM。MQA 的计算优势在 Sparse Kernel 中充分体现。`,
    bodyHTML: '<div>核心实现是 sparse_linear_attn_torch 函数：</div><pre><code>def sparse_linear_attn_torch(q, kv, topk_ids, block=64, scale=None):\n    L, H, d = q.shape\n    K_topk = topk_ids.shape[1]\n    num_blocks = math.ceil(K_topk / block)\n    o = torch.zeros(L, H, d, device=q.device, dtype=q.dtype)\n\n    for i in range(L):              # 外循环：逐 query\n        qi = q[i]                    # [H, d]\n        acc_o = torch.zeros(H, d)\n\n        for t in range(num_blocks):  # 内循环：分块 gather\n            start = t * block\n            end = min(start + block, K_topk)\n            idxs = topk_ids[i, start:end]\n\n            kv_block = kv[:, idxs]   # 非连续 KV gather\n            scores = qi @ kv_block[0].T   # q @ K\n            acc_o += scores @ kv_block[1]  # score @ V\n\n        o[i] = acc_o\n    return o</code></pre><div>三个关键提炼：第一，外循环逐 query 内循环分块；第二，gather 的 KV 地址不连续，各 query 稀疏子集互不相交；第三，MQA 优势——qi [H, d] @ K<sub>block</sub><sup>T</sup> [d, blk] 得 [H, blk]，多头并行无额外开销。</div><div>MQA 下 KV 只有一份所有 query 头共享，一次 GEMM 即可计算所有头的注意力分数。对比 MHA 需要 H 次独立 gather 加 H 次 GEMM。</div>',

// ③ 排版

var SERIF = "'Noto Serif SC', Georgia, serif";
var SANS = "'Inter', 'Helvetica Neue', sans-serif";

// 标题自适应：二分搜索最大字号，限制在 maxLines 行内
function fitTitle(text, maxWidth, maxLines) {
  var lo = 24, hi = 56, best = lo, bestLines = [];
  while (lo <= hi) {
    var size = Math.floor((lo + hi) / 2);
    var font = '700 ' + size + 'px ' + SERIF;
    var lh = Math.round(size * 1.15);
    var p = prepareWithSegments(text, font);
    var result = layoutWithLines(p, maxWidth, lh);
    if (result.lineCount <= maxLines) {
      best = size;
      bestLines = result.lines;
      lo = size + 1;
    } else {
      hi = size - 1;
    }
  }
  return { size: best, lineHeight: Math.round(best * 1.15), lines: bestLines };
}

// ═══════════════════════════════════════
// ④ 渲染
// ═══════════════════════════════════════
var titleWrap = document.getElementById('title-wrap');
var leadWrap = document.getElementById('lead-wrap');
var sectionsWrap = document.getElementById('sections-wrap');
var pulseWrap = document.getElementById('pulse-wrap');

function render() {
  var t0 = performance.now();
  var pageW = titleWrap.parentElement.clientWidth - 48; // padding

  // ---- Title: pretext 自适应字号 ----
  var title = fitTitle(TITLE, pageW, 3);
  titleWrap.innerHTML = '';
  for (var i = 0; i < title.lines.length; i++) {
    var el = document.createElement('div');
    el.className = 'title-line';
    el.textContent = title.lines[i].text;
    el.style.fontSize = title.size + 'px';
    el.style.lineHeight = title.lineHeight + 'px';
    titleWrap.appendChild(el);
  }

  // ---- Lead: pretext 测量行数，CSS 正常渲染 ----
  var leadFont = '500 15.5px ' + SANS;
  var leadLH = 26;
  var leadP = prepareWithSegments(LEAD, leadFont);
  var leadResult = layoutWithLines(leadP, pageW, leadLH);

  leadWrap.innerHTML = '';
  leadWrap.className = 'lead-block';
  for (var i = 0; i < leadResult.lines.length; i++) {
    var span = document.createElement('span');
    span.textContent = leadResult.lines[i].text;
    leadWrap.appendChild(span);
    if (i < leadResult.lines.length - 1) {
      leadWrap.appendChild(document.createTextNode(' '));
    }
  }
  // 用 pretext 测量的行数设置精确高度，避免 CLS
  leadWrap.style.height = leadResult.lineCount * leadLH + 'px';

  // ---- Sections: pretext 测量，CSS 渲染 ----
  sectionsWrap.innerHTML = '';
  var totalBodyLines = 0;

  for (var si = 0; si < SECTIONS.length; si++) {
    var s = SECTIONS[si];

    // figure section
    if (s.image) {
      var figSec = document.createElement('div');
      figSec.className = 'section';
      var figBlock = document.createElement('div');
      figBlock.className = 'figure-block';
      var img = document.createElement('img');
      img.src = s.image;
      img.alt = s.caption || '';
      (function(block, imgEl, promptText, captionText) {
        imgEl.onerror = function() {
          imgEl.style.display = 'none';
          var ph = document.createElement('div');
          ph.className = 'figure-placeholder';
          ph.innerHTML = '<div class="figure-placeholder-icon">&#9634;</div>' +
            '<div class="figure-placeholder-label">待生成插图</div>' +
            (promptText ? '<div class="figure-placeholder-prompt">' + promptText.replace(/</g,'&lt;') + '</div>' : '');
          block.insertBefore(ph, block.firstChild);
        };
      })(figBlock, img, s.prompt, s.caption);
      figBlock.appendChild(img);
      if (s.caption) {
        var cap = document.createElement('div');
        cap.className = 'figure-caption';
        cap.textContent = s.caption;
        figBlock.appendChild(cap);
      }
      if (s.prompt) {
        var promptEl = document.createElement('div');
        promptEl.className = 'figure-prompt-vis';
        promptEl.textContent = s.prompt;
        figBlock.appendChild(promptEl);
        figBlock.setAttribute('data-prompt', s.prompt);
      }
      figSec.appendChild(figBlock);
      sectionsWrap.appendChild(figSec);
      (function(block) {
        block.addEventListener('click', function() {
          if (block.classList.contains('zoomed')) {
            block.classList.remove('zoomed');
          } else {
            document.querySelectorAll('.figure-block.zoomed').forEach(function(b) { b.classList.remove('zoomed'); });
            block.classList.add('zoomed');
          }
        });
      })(figBlock);
      continue;
    }

    var sec = document.createElement('div');
    sec.className = 'section';

    // heading

    var hP = prepareWithSegments(s.heading, hFont);
    var hResult = layoutWithLines(hP, pageW, 22);
    totalBodyLines += hResult.lineCount;

    var hEl = document.createElement('div');
    hEl.className = 'section-h';
    hEl.textContent = s.heading;

    // callout (if any)

      var cP = prepareWithSegments(s.callout, cFont);
      var cResult = layoutWithLines(cP, pageW - 56, 25);
      totalBodyLines += cResult.lineCount;

      var cEl = document.createElement('div');
      cEl.className = 'callout';

      sec.appendChild(cEl);
    }

    // body
    var bFont = '400 17px ' + SERIF;
    var bP = prepareWithSegments(s.body, bFont);
    var bResult = layoutWithLines(bP, pageW, 30);
    totalBodyLines += bResult.lineCount;

    var bEl = document.createElement('div');
    bEl.className = 'section-body';
    if (s.bodyHTML) {
      bEl.innerHTML = s.bodyHTML;
    } else {
      bEl.textContent = s.body;
      bEl.style.height = bResult.lineCount * 30 + 'px';
    }
    sec.appendChild(bEl);

    sectionsWrap.appendChild(sec);
  }

  // ---- Pulse ----
  var pFont = '600 17px ' + SANS;
  var pP = prepareWithSegments(PULSE, pFont);
  var pResult = layoutWithLines(pP, pageW, 28);
  totalBodyLines += pResult.lineCount;
  pulseWrap.textContent = PULSE;
  pulseWrap.style.height = pResult.lineCount * 28 + 'px';

  var ms = performance.now() - t0;

  // Stats
  document.getElementById('sTitle').textContent = title.lines.length + ' lines, ' + title.size + 'px';
  document.getElementById('sLead').textContent = leadResult.lineCount + ' lines';
  document.getElementById('sBody').textContent = totalBodyLines;
  document.getElementById('sMs').textContent = ms.toFixed(2) + 'ms';
  document.getElementById('sDom').textContent = '0';
}

// ═══════════════════════════════════════
// ⑤ 启动
// ═══════════════════════════════════════
await document.fonts.ready;
render();

// 代码块点击复制
document.addEventListener('click', function(e) {
  var pre = e.target.closest('.section-body pre');
  if (!pre) return;
  var code = pre.querySelector('code');
  var text = code ? code.textContent : pre.textContent;
  navigator.clipboard.writeText(text).then(function() {
    pre.classList.add('copied');
    setTimeout(function() { pre.classList.remove('copied'); }, 1500);
  });
});

var resizeTimer = 0;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 100);
});

// ═══════════════════════════════════════════════════
// ⑥ 火柴人 — 点击位置出现，挥手提示
// ═══════════════════════════════════════════════════
var stickCanvas = document.getElementById('stick-canvas');
var sctx = stickCanvas.getContext('2d');
var ACCENT = '#C45A20';
var ACCENT_LIGHT = '#FDF0E6';

var stick = {
  active: false,
  opacity: 0,
  cx: 0, cy: 0,       // 点击位置（锚点）
  jumpY: 0,
  jumpVY: 0,
  bouncePhase: 0,
  age: 0,              // 出现后经过的秒数
  blinkTimer: 2,
  blinking: false,
  exiting: false
};

function resizeStick() {
  stickCanvas.width = window.innerWidth;
  stickCanvas.height = window.innerHeight;
}
resizeStick();
window.addEventListener('resize', resizeStick);

// 点击任意位置 → 生成火柴人
document.addEventListener('click', function(e) {
  if (e.target === stickCanvas) return;

  // 如果已经显示 → 淡出消失（取消）
  if (stick.active && !stick.exiting) {
    stick.exiting = true;
    return;
  }

  // 否则在新位置生成
  stick.active = true;
  stick.exiting = false;
  stick.cx = e.clientX;
  stick.cy = e.clientY;
  stick.opacity = 0;
  stick.jumpY = -20;
  stick.jumpVY = 0;
  stick.bouncePhase = 0;
  stick.blinkTimer = 2;
  stick.blinking = false;
});

function drawStick(t) {
  if (!stick.active) return;

  var dt = 1 / 60;
  stick.age += dt;

  // 淡入
  if (stick.exiting) {
    stick.opacity -= 0.07;
    if (stick.opacity <= 0) {
      stick.active = false;
      stick.exiting = false;
      sctx.clearRect(0, 0, stickCanvas.width, stickCanvas.height);
      return;
    }
  } else {
    stick.opacity = Math.min(1, stick.opacity + 0.1);
  }

  // 弹跳物理
  stick.jumpVY += 0.55;
  stick.jumpY += stick.jumpVY;
  if (stick.jumpY >= 0) {
    stick.jumpY = 0;
    if (stick.bouncePhase < 3 && Math.abs(stick.jumpVY) > 0.5) {
      stick.jumpVY = -stick.jumpVY * 0.45;
      stick.bouncePhase++;
    } else {
      stick.jumpVY = 0;
    }
  }

  // 站稳后微微呼吸
  var bob = stick.jumpY === 0 ? Math.sin(t * 3.5) * 1.5 : 0;

  // 眨眼
  stick.blinkTimer -= dt;
  if (stick.blinkTimer <= 0) {
    if (stick.blinking) {
      stick.blinking = false;
      stick.blinkTimer = 1.5 + Math.random() * 3;
    } else {
      stick.blinking = true;
      stick.blinkTimer = 0.1;
    }
  }

  sctx.clearRect(0, 0, stickCanvas.width, stickCanvas.height);
  sctx.save();
  sctx.globalAlpha = stick.opacity;

  var x = stick.cx;
  var y = stick.cy + stick.jumpY + bob;
  var sc = 0.65;

  sctx.translate(x, y);
  sctx.scale(sc, sc);

  // 柔和发光
  var glow = sctx.createRadialGradient(0, -24, 4, 0, -24, 55);
  glow.addColorStop(0, 'rgba(196,90,32,0.1)');
  glow.addColorStop(1, 'rgba(196,90,32,0)');
  sctx.fillStyle = glow;
  sctx.fillRect(-55, -80, 110, 110);

  var headR = 10;
  var bodyTop = -headR * 2 - 22;
  var bodyBot = -headR * 2;
  var legLen = 18;
  var armLen = 16;

  sctx.lineCap = 'round';
  sctx.lineJoin = 'round';

  // 腿
  sctx.strokeStyle = ACCENT;
  sctx.lineWidth = 2;
  sctx.beginPath(); sctx.moveTo(-4, bodyBot); sctx.lineTo(-6, bodyBot + legLen); sctx.stroke();
  sctx.beginPath(); sctx.moveTo(4, bodyBot);  sctx.lineTo(6, bodyBot + legLen); sctx.stroke();

  // 身体
  sctx.lineWidth = 2.2;
  sctx.beginPath(); sctx.moveTo(0, bodyTop); sctx.lineTo(0, bodyBot); sctx.stroke();

  var armBase = bodyTop + 6;

  // 右手臂 — 挥手（举起 + 左右摇摆）
  var waveAngle = Math.sin(t * 7) * 0.45;              // 手掌左右摆
  var raiseAngle = -Math.PI / 2 + waveAngle;            // 基础朝上 + 摆动
  var rwx = Math.cos(raiseAngle) * armLen;
  var rwy = Math.sin(raiseAngle) * armLen;
  sctx.lineWidth = 2;
  sctx.strokeStyle = ACCENT;
  sctx.beginPath(); sctx.moveTo(0, armBase); sctx.lineTo(rwx, armBase + rwy); sctx.stroke();

  // 挥手手掌（小圆）
  var handR = 3 + Math.sin(t * 7) * 0.5;
  sctx.beginPath();
  sctx.arc(rwx, armBase + rwy, handR, 0, Math.PI * 2);
  sctx.fillStyle = ACCENT;
  sctx.fill();

  // 左手臂 — 自然下垂
  sctx.beginPath(); sctx.moveTo(0, armBase); sctx.lineTo(-12, armBase + 10); sctx.stroke();

  // 头
  var headY = bodyTop - headR;
  sctx.beginPath();
  sctx.arc(0, headY, headR, 0, Math.PI * 2);
  sctx.fillStyle = ACCENT;
  sctx.fill();

  // 眼睛
  var eyeOff = 3.5;
  var eyeY = headY - 1;
  if (stick.blinking) {
    sctx.strokeStyle = ACCENT_LIGHT;
    sctx.lineWidth = 1;
    sctx.beginPath(); sctx.moveTo(-eyeOff - 1.5, eyeY); sctx.lineTo(-eyeOff + 1.5, eyeY); sctx.stroke();
    sctx.beginPath(); sctx.moveTo(eyeOff - 1.5, eyeY); sctx.lineTo(eyeOff + 1.5, eyeY); sctx.stroke();
  } else {
    sctx.fillStyle = ACCENT_LIGHT;
    sctx.beginPath(); sctx.arc(-eyeOff, eyeY, 2, 0, Math.PI * 2); sctx.fill();
    sctx.beginPath(); sctx.arc(eyeOff, eyeY, 2, 0, Math.PI * 2); sctx.fill();
    // 高光
    sctx.fillStyle = '#fff';
    sctx.beginPath(); sctx.arc(-eyeOff + 0.7, eyeY - 0.7, 0.7, 0, Math.PI * 2); sctx.fill();
    sctx.beginPath(); sctx.arc(eyeOff + 0.7, eyeY - 0.7, 0.7, 0, Math.PI * 2); sctx.fill();
  }

  // 嘴巴 — 微笑
  sctx.strokeStyle = ACCENT_LIGHT;
  sctx.lineWidth = 1;
  sctx.beginPath();
  sctx.arc(0, headY + 3.5, 3, 0.2, Math.PI - 0.2);
  sctx.stroke();

  sctx.restore();
}

// 动画循环
function animateStick(now) {
  requestAnimationFrame(animateStick);
  var t = now / 1000;
  if (!stick.active) return;
  drawStick(t);
}
requestAnimationFrame(animateStick);
</script>
</body>
</html>
