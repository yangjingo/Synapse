<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On-Policy Distillation — Pretext 排版 Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAF7;
      --ink: #1A1A1A;
      --muted: #8A7F70;
      --accent: #C45A20;
      --accent-light: #FDF0E6;
      --border: #E8E2D8;
      --serif: 'Noto Serif SC', Georgia, serif;
      --sans: 'Inter', 'Helvetica Neue', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg); color: var(--ink); }
    body { min-height: 100vh; padding-bottom: 48px; }

    .page { max-width: 700px; margin: 0 auto; padding: 72px 24px 0; }

    .title-line {
      font-family: var(--serif);
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.03em;
    }
    .lead-block {
      font-family: var(--sans);
      font-weight: 500;
      font-size: 15.5px;
      line-height: 26px;
      color: var(--muted);
      margin: 16px 0 0;
    }
    .hr { height: 1px; background: var(--border); margin: 40px 0; }

    .section { margin-top: 40px; }
    .section-h {
      font: 700 15px/1.3 var(--sans);
      color: var(--accent);
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    .section-body {
      font: 400 17px/30px var(--serif);
      color: var(--ink);
    }
    .section-body a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(196,90,32,0.3);
      text-underline-offset: 2px;
      transition: text-decoration-color 0.2s;
    }
    .section-body a:hover {
      text-decoration-color: var(--accent);
    }
    .callout {
      position: relative;
      margin: 20px 0;
      padding: 16px 20px 16px 24px;
      background: var(--accent-light);
      border-radius: 4px;
      font: 500 15px/25px var(--sans);
      color: #6B3A12;
    }
    .figure-block {
      margin: 32px auto;
      border-radius: 6px;
      overflow: hidden;
      background: #F5F3EE;
      max-width: 100%;
    }
    .figure-block img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 70vh;
      object-fit: contain;
      object-position: center;
      background: #fff;
      cursor: zoom-in;
      transition: transform 0.3s ease;
    }
    .figure-block.zoomed {
      position: fixed;
      inset: 0;
      max-width: none;
      margin: 0;
      border-radius: 0;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .figure-block.zoomed img {
      max-height: none;
      width: auto;
      max-width: 95vw;
      max-height: 95vh;
      cursor: zoom-out;
    }
    .figure-block.zoomed .figure-caption {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #eee;
      border-radius: 4px;
      padding: 6px 14px;
    }
    .figure-caption {
      padding: 10px 16px 12px;
      font: 500 13px/20px var(--sans);
      color: var(--muted);
    }
    .figure-placeholder {
      padding: 32px 20px;
      text-align: center;
      background: #EDEBE6;
    }
    .figure-placeholder-icon {
      font: 700 28px/1 var(--sans);
      color: var(--border);
      margin-bottom: 8px;
    }
    .figure-placeholder-label {
      font: 600 13px/1 var(--sans);
      color: var(--accent);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .figure-placeholder-prompt {
      font: 400 12px/18px var(--sans);
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto;
      white-space: pre-wrap;
    }
    .figure-prompt {
      display: none;
    }
    .callout::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent);
      border-radius: 4px 0 0 4px;
    }
    .pulse {
      margin-top: 48px;
      font: 600 17px/28px var(--sans);
      color: var(--accent);
    }

    .meta-tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 3px;
      font: 700 11px/1 var(--sans);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .meta-date {
      font: 500 13px/1 var(--sans);
      color: var(--muted);
      margin-bottom: 24px;
    }

    .stats {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(250,250,247,0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      padding: 8px 24px;
      display: flex; gap: 20px; flex-wrap: wrap;
      font: 500 11px/1 var(--sans);
      color: var(--muted);
      z-index: 100;
    }
    .stats .v { color: var(--accent); font-weight: 700; }

    #stick-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 50;
    }
    #smoke-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .smoke-wrap { position: relative; overflow: visible; }
    .smoke-wrap .page { position: relative; z-index: 1; }
    #title-wrap { min-height: 80px; }
  </style>
</head>
<body>
<canvas id="stick-canvas"></canvas>
<div class="smoke-wrap">
  <canvas id="smoke-canvas"></canvas>
<div class="page">
  <div class="meta-tag">LLM Post-Train</div>
  <div class="meta-date">2026/04/29 &middot; yangjing</div>

  <div id="title-wrap"></div>
  <div id="lead-wrap"></div>

  <div class="hr"></div>

  <div id="sections-wrap"></div>

  <div id="pulse-wrap" class="pulse"></div>
</div>
</div>

<div class="stats">
  <span>Title: <span class="v" id="sTitle">&mdash;</span></span>
  <span>Lead: <span class="v" id="sLead">&mdash;</span></span>
  <span>Body lines: <span class="v" id="sBody">&mdash;</span></span>
  <span>Layout: <span class="v" id="sMs">&mdash;</span></span>
  <span>DOM reads: <span class="v" id="sDom">0</span></span>
</div>

var SERIF = "'Noto Serif SC', Georgia, serif";
var SANS = "'Inter', 'Helvetica Neue', sans-serif";

function fitTitle(text, maxWidth, maxLines) {
  var lo = 24, hi = 56, best = lo, bestLines = [];
  while (lo <= hi) {
    var size = Math.floor((lo + hi) / 2);
    var font = '700 ' + size + 'px ' + SERIF;
    var lh = Math.round(size * 1.15);
    var p = prepareWithSegments(text, font);
    var result = layoutWithLines(p, maxWidth, lh);
    if (result.lineCount <= maxLines) {
      best = size;
      bestLines = result.lines;
      lo = size + 1;
    } else {
      hi = size - 1;
    }
  }
  return { size: best, lineHeight: Math.round(best * 1.15), lines: bestLines };
}

var titleWrap = document.getElementById('title-wrap');
var leadWrap = document.getElementById('lead-wrap');
var sectionsWrap = document.getElementById('sections-wrap');
var pulseWrap = document.getElementById('pulse-wrap');

function render() {
  var t0 = performance.now();
  var pageW = titleWrap.parentElement.clientWidth - 48;

  // Title: pretext 自适应字号 + DOM 渲染
  titleWrap.innerHTML = '';
  var title = fitTitle(TITLE, pageW, 3);
  for (var i = 0; i < title.lines.length; i++) {
    var el = document.createElement('div');
    el.className = 'title-line';
    el.textContent = title.lines[i].text;
    el.style.fontSize = title.size + 'px';
    el.style.lineHeight = title.lineHeight + 'px';
    titleWrap.appendChild(el);
  }

  var leadFont = '500 15.5px ' + SANS;
  var leadLH = 26;
  var leadP = prepareWithSegments(LEAD, leadFont);
  var leadResult = layoutWithLines(leadP, pageW, leadLH);

  leadWrap.innerHTML = '';
  leadWrap.className = 'lead-block';
  for (var i = 0; i < leadResult.lines.length; i++) {
    var span = document.createElement('span');
    span.textContent = leadResult.lines[i].text;
    leadWrap.appendChild(span);
    if (i < leadResult.lines.length - 1) {
      leadWrap.appendChild(document.createTextNode(' '));
    }
  }
  leadWrap.style.height = leadResult.lineCount * leadLH + 'px';

  sectionsWrap.innerHTML = '';
  var totalBodyLines = 0;

  for (var si = 0; si < SECTIONS.length; si++) {
    var s = SECTIONS[si];

    // Figure section (image + caption, no text)
    if (s.image) {
      var figSec = document.createElement('div');
      figSec.className = 'section';
      var figBlock = document.createElement('div');
      figBlock.className = 'figure-block';
      var img = document.createElement('img');
      img.src = s.image;
      img.alt = s.caption || '';
      (function(block, imgEl, promptText, captionText) {
        imgEl.onerror = function() {
          imgEl.style.display = 'none';
          var ph = document.createElement('div');
          ph.className = 'figure-placeholder';
          ph.innerHTML = '<div class="figure-placeholder-icon">&#9634;</div>' +
            '<div class="figure-placeholder-label">待生成插图</div>' +
            (promptText ? '<div class="figure-placeholder-prompt">' + promptText.replace(/</g,'&lt;') + '</div>' : '');
          block.insertBefore(ph, block.firstChild);
        };
      })(figBlock, img, s.prompt, s.caption);
      figBlock.appendChild(img);
      if (s.caption) {
        var cap = document.createElement('div');
        cap.className = 'figure-caption';
        cap.textContent = s.caption;
        figBlock.appendChild(cap);
      }
      if (s.prompt) {
        figBlock.setAttribute('data-prompt', s.prompt);
        figBlock.classList.add('figure-prompt-visible');
      }
      figSec.appendChild(figBlock);
      sectionsWrap.appendChild(figSec);
      (function(block) {
        block.addEventListener('click', function() {
          if (block.classList.contains('zoomed')) {
            block.classList.remove('zoomed');
          } else {
            document.querySelectorAll('.figure-block.zoomed').forEach(function(b) { b.classList.remove('zoomed'); });
            block.classList.add('zoomed');
          }
        });
      })(figBlock);
      continue;
    }

    var sec = document.createElement('div');
    sec.className = 'section';

    var hFont = '700 15px ' + SANS;
    var hP = prepareWithSegments(s.heading, hFont);
    var hResult = layoutWithLines(hP, pageW, 22);
    totalBodyLines += hResult.lineCount;

    var hEl = document.createElement('div');
    hEl.className = 'section-h';
    hEl.textContent = s.heading;
    sec.appendChild(hEl);

    if (s.callout) {
      var cFont = '500 15px ' + SANS;
      var cP = prepareWithSegments(s.callout, cFont);
      var cResult = layoutWithLines(cP, pageW - 56, 25);
      totalBodyLines += cResult.lineCount;

      var cEl = document.createElement('div');
      cEl.className = 'callout';
      cEl.textContent = s.callout;
      sec.appendChild(cEl);
    }

    var bFont = '400 17px ' + SERIF;
    var bP = prepareWithSegments(s.body, bFont);
    var bResult = layoutWithLines(bP, pageW, 30);
    totalBodyLines += bResult.lineCount;

    var bEl = document.createElement('div');
    bEl.className = 'section-body';
    if (s.bodyHTML) {
      bEl.innerHTML = s.bodyHTML;
    } else {
      bEl.textContent = s.body;
      bEl.style.height = bResult.lineCount * 30 + 'px';
    }
    sec.appendChild(bEl);

    sectionsWrap.appendChild(sec);
  }

  var pFont = '600 17px ' + SANS;
  var pP = prepareWithSegments(PULSE, pFont);
  var pResult = layoutWithLines(pP, pageW, 28);
  totalBodyLines += pResult.lineCount;
  pulseWrap.textContent = PULSE;
  pulseWrap.style.height = pResult.lineCount * 28 + 'px';

  var ms = performance.now() - t0;
  document.getElementById('sTitle').textContent = title.lines.length + ' lines, ' + title.size + 'px';
  document.getElementById('sLead').textContent = leadResult.lineCount + ' lines';
  document.getElementById('sBody').textContent = totalBodyLines;
  document.getElementById('sMs').textContent = ms.toFixed(2) + 'ms';
  document.getElementById('sDom').textContent = '0';
}

// ⑥ 火柴人 — 点击位置出现，挥手提示
// ═══════════════════════════════════════════════════
var stickCanvas = document.getElementById('stick-canvas');
var sctx = stickCanvas.getContext('2d');
var ACCENT = '#C45A20';
var ACCENT_LIGHT = '#FDF0E6';

var stick = {
  active: false,
  opacity: 0,
  cx: 0, cy: 0,       // 点击位置（锚点）
  jumpY: 0,
  jumpVY: 0,
  bouncePhase: 0,
  age: 0,              // 出现后经过的秒数
  blinkTimer: 2,
  blinking: false,
  exiting: false
};

function resizeStick() {
  stickCanvas.width = window.innerWidth;
  stickCanvas.height = window.innerHeight;
}
resizeStick();
window.addEventListener('resize', resizeStick);

// 点击任意位置 → 生成火柴人
document.addEventListener('click', function(e) {
  if (e.target === stickCanvas) return;

  // 如果已经显示 → 淡出消失（取消）
  if (stick.active && !stick.exiting) {
    stick.exiting = true;
    return;
  }

  // 否则在新位置生成
  stick.active = true;
  stick.exiting = false;
  stick.cx = e.clientX;
  stick.cy = e.clientY;
  stick.opacity = 0;
  stick.jumpY = -20;
  stick.jumpVY = 0;
  stick.bouncePhase = 0;
  stick.blinkTimer = 2;
  stick.blinking = false;
});

function drawStick(t) {
  if (!stick.active) return;

  var dt = 1 / 60;
  stick.age += dt;

  // 淡入
  if (stick.exiting) {
    stick.opacity -= 0.07;
    if (stick.opacity <= 0) {
      stick.active = false;
      stick.exiting = false;
      sctx.clearRect(0, 0, stickCanvas.width, stickCanvas.height);
      return;
    }
  } else {
    stick.opacity = Math.min(1, stick.opacity + 0.1);
  }

  // 弹跳物理
  stick.jumpVY += 0.55;
  stick.jumpY += stick.jumpVY;
  if (stick.jumpY >= 0) {
    stick.jumpY = 0;
    if (stick.bouncePhase < 3 && Math.abs(stick.jumpVY) > 0.5) {
      stick.jumpVY = -stick.jumpVY * 0.45;
      stick.bouncePhase++;
    } else {
      stick.jumpVY = 0;
    }
  }

  // 站稳后微微呼吸
  var bob = stick.jumpY === 0 ? Math.sin(t * 3.5) * 1.5 : 0;

  // 眨眼
  stick.blinkTimer -= dt;
  if (stick.blinkTimer <= 0) {
    if (stick.blinking) {
      stick.blinking = false;
      stick.blinkTimer = 1.5 + Math.random() * 3;
    } else {
      stick.blinking = true;
      stick.blinkTimer = 0.1;
    }
  }

  sctx.clearRect(0, 0, stickCanvas.width, stickCanvas.height);
  sctx.save();
  sctx.globalAlpha = stick.opacity;

  var x = stick.cx;
  var y = stick.cy + stick.jumpY + bob;
  var sc = 0.65;

  sctx.translate(x, y);
  sctx.scale(sc, sc);

  // 柔和发光
  var glow = sctx.createRadialGradient(0, -24, 4, 0, -24, 55);
  glow.addColorStop(0, 'rgba(196,90,32,0.1)');
  glow.addColorStop(1, 'rgba(196,90,32,0)');
  sctx.fillStyle = glow;
  sctx.fillRect(-55, -80, 110, 110);

  var headR = 10;
  var bodyTop = -headR * 2 - 22;
  var bodyBot = -headR * 2;
  var legLen = 18;
  var armLen = 16;

  sctx.lineCap = 'round';
  sctx.lineJoin = 'round';

  // 腿
  sctx.strokeStyle = ACCENT;
  sctx.lineWidth = 2;
  sctx.beginPath(); sctx.moveTo(-4, bodyBot); sctx.lineTo(-6, bodyBot + legLen); sctx.stroke();
  sctx.beginPath(); sctx.moveTo(4, bodyBot);  sctx.lineTo(6, bodyBot + legLen); sctx.stroke();

  // 身体
  sctx.lineWidth = 2.2;
  sctx.beginPath(); sctx.moveTo(0, bodyTop); sctx.lineTo(0, bodyBot); sctx.stroke();

  var armBase = bodyTop + 6;

  // 右手臂 — 挥手（举起 + 左右摇摆）
  var waveAngle = Math.sin(t * 7) * 0.45;              // 手掌左右摆
  var raiseAngle = -Math.PI / 2 + waveAngle;            // 基础朝上 + 摆动
  var rwx = Math.cos(raiseAngle) * armLen;
  var rwy = Math.sin(raiseAngle) * armLen;
  sctx.lineWidth = 2;
  sctx.strokeStyle = ACCENT;
  sctx.beginPath(); sctx.moveTo(0, armBase); sctx.lineTo(rwx, armBase + rwy); sctx.stroke();

  // 挥手手掌（小圆）
  var handR = 3 + Math.sin(t * 7) * 0.5;
  sctx.beginPath();
  sctx.arc(rwx, armBase + rwy, handR, 0, Math.PI * 2);
  sctx.fillStyle = ACCENT;
  sctx.fill();

  // 左手臂 — 自然下垂
  sctx.beginPath(); sctx.moveTo(0, armBase); sctx.lineTo(-12, armBase + 10); sctx.stroke();

  // 头
  var headY = bodyTop - headR;
  sctx.beginPath();
  sctx.arc(0, headY, headR, 0, Math.PI * 2);
  sctx.fillStyle = ACCENT;
  sctx.fill();

  // 眼睛
  var eyeOff = 3.5;
  var eyeY = headY - 1;
  if (stick.blinking) {
    sctx.strokeStyle = ACCENT_LIGHT;
    sctx.lineWidth = 1;
    sctx.beginPath(); sctx.moveTo(-eyeOff - 1.5, eyeY); sctx.lineTo(-eyeOff + 1.5, eyeY); sctx.stroke();
    sctx.beginPath(); sctx.moveTo(eyeOff - 1.5, eyeY); sctx.lineTo(eyeOff + 1.5, eyeY); sctx.stroke();
  } else {
    sctx.fillStyle = ACCENT_LIGHT;
    sctx.beginPath(); sctx.arc(-eyeOff, eyeY, 2, 0, Math.PI * 2); sctx.fill();
    sctx.beginPath(); sctx.arc(eyeOff, eyeY, 2, 0, Math.PI * 2); sctx.fill();
    // 高光
    sctx.fillStyle = '#fff';
    sctx.beginPath(); sctx.arc(-eyeOff + 0.7, eyeY - 0.7, 0.7, 0, Math.PI * 2); sctx.fill();
    sctx.beginPath(); sctx.arc(eyeOff + 0.7, eyeY - 0.7, 0.7, 0, Math.PI * 2); sctx.fill();
  }

  // 嘴巴 — 微笑
  sctx.strokeStyle = ACCENT_LIGHT;
  sctx.lineWidth = 1;
  sctx.beginPath();
  sctx.arc(0, headY + 3.5, 3, 0.2, Math.PI - 0.2);
  sctx.stroke();

  sctx.restore();
}

// 动画循环
function animateStick(now) {
  requestAnimationFrame(animateStick);
  var t = now / 1000;
  if (!stick.active) return;
  drawStick(t);
}
requestAnimationFrame(animateStick);

// ═══════════════════════════════════════════════════
// ⑦ 烟雾 + 流体标题动画
// ═══════════════════════════════════════════════════
var smokeCanvas = document.getElementById('smoke-canvas');
var smCtx = smokeCanvas.getContext('2d');
var ACCENT_SMOKE = { r: 196, g: 90, b: 32 };

// Mouse tracking
var smokeMouse = { x: window.innerWidth / 2, y: window.innerHeight / 3 };
var smokeMouseSmooth = { x: smokeMouse.x, y: smokeMouse.y };

document.addEventListener('mousemove', function(e) {
  smokeMouse.x = e.clientX;
  smokeMouse.y = e.clientY;
});
document.addEventListener('touchmove', function(e) {
  smokeMouse.x = e.touches[0].clientX;
  smokeMouse.y = e.touches[0].clientY;
}, { passive: true });

function resizeSmoke() {
  smokeCanvas.width = window.innerWidth;
  smokeCanvas.height = window.innerHeight;
}
resizeSmoke();
window.addEventListener('resize', resizeSmoke);

var smokeParticles = [];
var MAX_SMOKE = 200;
var trailPoints = [];

function emitSmoke() {
  // Emit from mouse position
  smokeMouseSmooth.x += (smokeMouse.x - smokeMouseSmooth.x) * 0.08;
  smokeMouseSmooth.y += (smokeMouse.y - smokeMouseSmooth.y) * 0.08;

  // Trail
  trailPoints.push({ x: smokeMouseSmooth.x, y: smokeMouseSmooth.y, life: 1 });
  if (trailPoints.length > 30) trailPoints.shift();

  var emitCount = 3;
  for (var n = 0; n < emitCount; n++) {
    if (smokeParticles.length >= MAX_SMOKE) break;
    var angle = Math.random() * Math.PI * 2;
    var speed = 0.2 + Math.random() * 0.6;
    smokeParticles.push({
      x: smokeMouseSmooth.x + (Math.random() - 0.5) * 10,
      y: smokeMouseSmooth.y + (Math.random() - 0.5) * 10,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.3,
      r: 15 + Math.random() * 40,
      life: 1,
      decay: 0.005 + Math.random() * 0.008,
      phase: Math.random() * Math.PI * 2
    });
  }

  // Also emit ambient particles from edges
  if (Math.random() < 0.15 && smokeParticles.length < MAX_SMOKE) {
    smokeParticles.push({
      x: Math.random() * smokeCanvas.width,
      y: smokeCanvas.height + 20,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(0.5 + Math.random() * 0.8),
      r: 40 + Math.random() * 80,
      life: 1,
      decay: 0.002 + Math.random() * 0.003,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function updateSmoke() {
  emitSmoke();
  for (var i = smokeParticles.length - 1; i >= 0; i--) {
    var p = smokeParticles[i];
    p.x += p.vx + Math.sin(p.phase + (1 - p.life) * 4) * 0.4;
    p.y += p.vy;
    p.r += 0.4;
    p.life -= p.decay;
    if (p.life <= 0) smokeParticles.splice(i, 1);
  }
  // Fade trail
  for (var j = trailPoints.length - 1; j >= 0; j--) {
    trailPoints[j].life -= 0.04;
    if (trailPoints[j].life <= 0) trailPoints.splice(j, 1);
  }
}

function drawSmoke(t) {
  smCtx.clearRect(0, 0, smokeCanvas.width, smokeCanvas.height);

  // Draw mouse trail glow
  if (trailPoints.length > 1) {
    for (var j = 0; j < trailPoints.length; j++) {
      var tp = trailPoints[j];
      var ta = tp.life * 0.08;
      var tr = 30 + (1 - tp.life) * 20;
      var tGrad = smCtx.createRadialGradient(tp.x, tp.y, 0, tp.x, tp.y, tr);
      tGrad.addColorStop(0, 'rgba(' + ACCENT_SMOKE.r + ',' + ACCENT_SMOKE.g + ',' + ACCENT_SMOKE.b + ',' + ta + ')');
      tGrad.addColorStop(1, 'rgba(' + ACCENT_SMOKE.r + ',' + ACCENT_SMOKE.g + ',' + ACCENT_SMOKE.b + ',0)');
      smCtx.fillStyle = tGrad;
      smCtx.beginPath();
      smCtx.arc(tp.x, tp.y, tr, 0, Math.PI * 2);
      smCtx.fill();
    }
  }

  // Draw smoke particles
  for (var i = 0; i < smokeParticles.length; i++) {
    var p = smokeParticles[i];
    var alpha = p.life * 0.07;
    var grad = smCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    grad.addColorStop(0, 'rgba(' + ACCENT_SMOKE.r + ',' + ACCENT_SMOKE.g + ',' + ACCENT_SMOKE.b + ',' + alpha + ')');
    grad.addColorStop(1, 'rgba(' + ACCENT_SMOKE.r + ',' + ACCENT_SMOKE.g + ',' + ACCENT_SMOKE.b + ',0)');
    smCtx.fillStyle = grad;
    smCtx.beginPath();
    smCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    smCtx.fill();
  }
}

function animateSmoke(now) {
  requestAnimationFrame(animateSmoke);
  var t = now / 1000;
  updateSmoke();
  drawSmoke(t);
}
requestAnimationFrame(animateSmoke);

</script>
</body>
