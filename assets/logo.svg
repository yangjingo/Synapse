<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#1a1a2e" opacity="0.95"/>

  <!-- Code brackets left -->
  <path d="M 130 140 Q 100 200 130 260" stroke="url(#grad1)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 145 140 Q 125 200 145 260" stroke="url(#grad1)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Code brackets right -->
  <path d="M 270 140 Q 300 200 270 260" stroke="url(#grad1)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 255 140 Q 275 200 255 260" stroke="url(#grad1)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- AI brain/circuit pattern -->
  <g transform="translate(200, 200)">
    <!-- Center node -->
    <circle cx="0" cy="0" r="20" fill="url(#grad2)"/>

    <!-- Circuit lines -->
    <line x1="-25" y1="-15" x2="-45" y2="-30" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="-15" x2="45" y2="-30" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="15" x2="-45" y2="30" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="15" x2="45" y2="30" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>

    <!-- Outer nodes -->
    <circle cx="-50" cy="-35" r="10" fill="url(#grad1)"/>
    <circle cx="50" cy="-35" r="10" fill="url(#grad1)"/>
    <circle cx="-50" cy="35" r="10" fill="url(#grad1)"/>
    <circle cx="50" cy="35" r="10" fill="url(#grad1)"/>
  </g>

  <!-- Blog/document icon -->
  <g transform="translate(200, 320)">
    <rect x="-30" y="-35" width="60" height="70" rx="4" fill="none" stroke="url(#grad1)" stroke-width="3"/>
    <line x1="-18" y1="-18" x2="18" y2="-18" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="-5" x2="18" y2="-5" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="8" x2="8" y2="8" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- "AI" text -->
  <text x="200" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="42" fill="url(#grad1)">AI</text>

  <!-- "Tech Blog" text -->
  <text x="200" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="24" fill="#e2e8f0">Tech Blog</text>
</svg>
