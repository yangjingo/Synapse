<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    .shaky { 
      stroke: #000; 
      stroke-width: 3; 
      fill: none; 
      stroke-linecap: round; 
      stroke-linejoin: round; 
    }
    .watermark {
      font-family: Arial, sans-serif;
      font-size: 8px;
      fill: rgba(0, 0, 0, 0.1);
      pointer-events: none;
    }
  </style>

  <circle class="shaky" cx="200" cy="200" r="22" />

  <g class="shaky">
    <line x1="175" y1="175" x2="160" y2="160" />
    <line x1="225" y1="175" x2="240" y2="160" />
    <line x1="175" y1="225" x2="160" y2="240" />
    <line x1="225" y1="225" x2="240" y2="240" />
  </g>

  <circle class="shaky" cx="150" cy="150" r="10" />
  <circle class="shaky" cx="250" cy="150" r="10" />
  <circle class="shaky" cx="150" cy="250" r="10" />
  <circle class="shaky" cx="250" cy="250" r="10" />

  <g class="shaky">
    <path d="M 120,130 Q 80,200 120,270" />
    <path d="M 105,120 Q 55,200 105,280" />
    <path d="M 90,110 Q 30,200 90,290" />
  </g>

  <g class="shaky">
    <path d="M 280,130 Q 320,200 280,270" />
    <path d="M 295,120 Q 345,200 295,280" />
    <path d="M 310,110 Q 370,200 310,290" />
  </g>

  <text x="260" y="390" class="watermark">whyj + nano banano + 2026/03/30</text>
</svg>
